trigger:
  branches:
    include:
      - main

variables:
  - group: event-driven-azure-dev
  - name: azureServiceConnection
    value: IAC-Conn
  - name: orderImageName
    value: order-service
  - name: inventoryImageName
    value: inventory-service
  - name: kubernetesNamespace
    value: event-driven
  - name: releaseName
    value: event-driven-azure
  - name: runtimeSecretName
    value: event-driven-azure-runtime
  - name: keyVaultSecretsFilter
    value: rabbitmq-url,redis-url
  - name: securityScanSeverity
    value: HIGH,CRITICAL
  - name: approvalNotifyUsers
    value: ""

stages:

# =========================
# PRE-BUILD SECURITY SCANNING
# =========================
- stage: PreBuildSecurityScan
  jobs:
    - job: ScanSourceAndManifests
      pool:
        vmImage: ubuntu-latest
      steps:
        - checkout: self

        - script: |
            set -eu
            sudo apt-get update
            sudo apt-get install -y wget apt-transport-https gnupg lsb-release
            wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
            echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
            sudo apt-get update
            sudo apt-get install -y trivy
          displayName: Install Trivy

        - script: |
            set -eu
            trivy config --severity "$(securityScanSeverity)" --exit-code 1 services/order-service/Dockerfile
            trivy config --severity "$(securityScanSeverity)" --exit-code 1 services/inventory-service/Dockerfile
            trivy config --severity "$(securityScanSeverity)" --exit-code 1 helm/order-service
          displayName: Scan Dockerfiles And Kubernetes Manifests

        - script: |
            set -eu
            trivy fs \
              --scanners vuln,secret \
              --skip-dirs services/order-service/node_modules \
              --skip-dirs services/inventory-service/node_modules \
              --severity "$(securityScanSeverity)" \
              --exit-code 1 \
              .
          displayName: Scan Source Code Dependencies And Secrets

        - script: |
            set -eu
            if [ -f services/inventory-service/package-lock.json ]; then
              npm audit --prefix services/inventory-service --omit=dev --audit-level=high
            fi

            if [ -f services/order-service/package-lock.json ]; then
              npm audit --prefix services/order-service --omit=dev --audit-level=high
            else
              echo "Skipping npm audit for order-service because package-lock.json is not present."
            fi
          displayName: Run NPM Dependency Audit

# =========================
# BUILD & PUSH IMAGE
# =========================
- stage: Build
  dependsOn: PreBuildSecurityScan
  jobs:
    - job: BuildPush
      pool:
        vmImage: ubuntu-latest
      steps:
        - checkout: self

        - task: Docker@2
          displayName: Build & Push Order Service Image
          inputs:
            containerRegistry: ACR-Connection
            repository: $(orderImageName)
            command: buildAndPush
            Dockerfile: services/order-service/Dockerfile
            buildContext: services/order-service
            tags: |
              $(Build.BuildId)

        - task: Docker@2
          displayName: Build & Push Inventory Service Image
          inputs:
            containerRegistry: ACR-Connection
            repository: $(inventoryImageName)
            command: buildAndPush
            Dockerfile: services/inventory-service/Dockerfile
            buildContext: services/inventory-service
            tags: |
              $(Build.BuildId)

        - task: HelmInstaller@1
          displayName: Install Helm

        - script: helm lint helm/order-service
          displayName: Lint Helm Chart

# =========================
# IMAGE SECURITY SCANNING
# =========================
- stage: ImageSecurityScan
  dependsOn: Build
  jobs:
    - job: ScanContainerImages
      pool:
        vmImage: ubuntu-latest
      steps:
        - checkout: self

        - script: |
            set -eu
            sudo apt-get update
            sudo apt-get install -y wget apt-transport-https gnupg lsb-release
            wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
            echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
            sudo apt-get update
            sudo apt-get install -y trivy
          displayName: Install Trivy

        - task: AzureCLI@2
          displayName: Scan Published Container Images
          inputs:
            azureSubscription: $(azureServiceConnection)
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              set -eu
              az acr login --name "$(acrName)"

              trivy image \
                --severity "$(securityScanSeverity)" \
                --exit-code 1 \
                "$(acrName).azurecr.io/$(orderImageName):$(Build.BuildId)"

              trivy image \
                --severity "$(securityScanSeverity)" \
                --exit-code 1 \
                "$(acrName).azurecr.io/$(inventoryImageName):$(Build.BuildId)"

# =========================
# MANUAL APPROVAL
# =========================
- stage: ManualApproval
  dependsOn: ImageSecurityScan
  jobs:
    - job: AwaitApproval
      displayName: Await Manual Approval
      pool: server
      timeoutInMinutes: 1440
      steps:
        - task: ManualValidation@0
          timeoutInMinutes: 1440
          inputs:
            notifyUsers: $(approvalNotifyUsers)
            instructions: Review security scan results, image tags, runtime configuration, and AKS change window before approving deployment.
            onTimeout: reject

# =========================
# DEPLOY TO AKS
# =========================
- stage: Deploy
  dependsOn: ManualApproval
  jobs:
    - deployment: DeployToAKS
      environment: dev
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self

              - task: HelmInstaller@1
                displayName: Install Helm

              - script: |
                  set -eu

                  for name in ACR_NAME AZURE_RESOURCE_GROUP AKS_CLUSTER_NAME KAFKA_BROKER KEY_VAULT_NAME RUNTIME_SECRET_NAME; do
                    eval "value=\${$name:-}"
                    if [ -z "$value" ]; then
                      echo "Required deployment variable $name is missing."
                      exit 1
                    fi
                  done
                displayName: Validate Deployment Variables
                env:
                  ACR_NAME: $(acrName)
                  AZURE_RESOURCE_GROUP: $(azureResourceGroup)
                  AKS_CLUSTER_NAME: $(aksClusterName)
                  KAFKA_BROKER: $(kafkaBroker)
                  KEY_VAULT_NAME: $(keyVaultName)
                  RUNTIME_SECRET_NAME: $(runtimeSecretName)

              - task: AzureKeyVault@2
                displayName: Fetch Runtime Secrets From Azure Key Vault
                inputs:
                  azureSubscription: $(azureServiceConnection)
                  KeyVaultName: $(keyVaultName)
                  SecretsFilter: $(keyVaultSecretsFilter)
                  RunAsPreJob: false

              - script: |
                  set -eu

                  for name in RABBITMQ_URL REDIS_URL; do
                    eval "value=\${$name:-}"
                    if [ -z "$value" ]; then
                      echo "Required Key Vault secret for $name is missing."
                      exit 1
                    fi
                  done
                displayName: Validate Key Vault Secrets
                env:
                  RABBITMQ_URL: $(rabbitmq-url)
                  REDIS_URL: $(redis-url)

              - task: AzureCLI@2
                displayName: Create Or Update AKS Runtime Secret
                inputs:
                  azureSubscription: $(azureServiceConnection)
                  scriptType: bash
                  scriptLocation: inlineScript
                  inlineScript: |
                    set -eu

                    az aks get-credentials \
                      --resource-group "$AZURE_RESOURCE_GROUP" \
                      --name "$AKS_CLUSTER_NAME" \
                      --overwrite-existing

                    kubectl create namespace "$KUBERNETES_NAMESPACE" \
                      --dry-run=client \
                      -o yaml | kubectl apply -f -

                    kubectl create secret generic "$RUNTIME_SECRET_NAME" \
                      --namespace "$KUBERNETES_NAMESPACE" \
                      --from-literal=RABBITMQ_URL="$RABBITMQ_URL" \
                      --from-literal=REDIS_URL="$REDIS_URL" \
                      --dry-run=client \
                      -o yaml | kubectl apply -f -
                env:
                  AZURE_RESOURCE_GROUP: $(azureResourceGroup)
                  AKS_CLUSTER_NAME: $(aksClusterName)
                  KUBERNETES_NAMESPACE: $(kubernetesNamespace)
                  RUNTIME_SECRET_NAME: $(runtimeSecretName)
                  RABBITMQ_URL: $(rabbitmq-url)
                  REDIS_URL: $(redis-url)

              - task: HelmDeploy@0
                displayName: Helm Upgrade
                inputs:
                  connectionType: Azure Resource Manager
                  azureSubscriptionEndpoint: $(azureServiceConnection)
                  azureResourceGroup: $(azureResourceGroup)
                  kubernetesCluster: $(aksClusterName)
                  namespace: $(kubernetesNamespace)
                  command: upgrade
                  chartType: FilePath
                  chartPath: helm/order-service
                  releaseName: $(releaseName)
                  install: true
                  waitForExecution: true
                  arguments: >
                    --atomic
                    --timeout 10m
                    --create-namespace
                    --set-string global.imageRegistry=$(acrName).azurecr.io
                    --set-string global.imageTag=$(Build.BuildId)
                    --set-string config.kafkaBroker=$(kafkaBroker)
                    --set secrets.create=false
                    --set-string secrets.existingSecret=$(runtimeSecretName)
