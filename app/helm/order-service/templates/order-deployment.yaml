apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "event-driven-azure.fullname" . }}-order
  labels:
    {{- include "event-driven-azure.labels" . | nindent 4 }}
    app.kubernetes.io/component: order-service
spec:
  {{- if not .Values.orderService.autoscaling.enabled }}
  replicas: {{ .Values.orderService.replicaCount }}
  {{- end }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: order-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: {{ .Values.orderService.service.port | quote }}
      labels:
        {{- include "event-driven-azure.labels" . | nindent 8 }}
        app.kubernetes.io/component: order-service
    spec:
      serviceAccountName: {{ include "event-driven-azure.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/instance: {{ .Release.Name }}
              app.kubernetes.io/component: order-service
      containers:
        - name: order-service
          image: {{ include "event-driven-azure.image" (dict "root" . "repository" .Values.orderService.image.repository) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: PORT
              value: {{ .Values.orderService.service.port | quote }}
            - name: OTEL_SERVICE_NAME
              value: order-service
            - name: OTEL_ENABLED
              value: {{ .Values.otel.enabled | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "event-driven-azure.secretName" . }}
                  key: JWT_SECRET
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "event-driven-azure.secretName" . }}
                  key: REDIS_URL
          envFrom:
            - configMapRef:
                name: {{ include "event-driven-azure.fullname" . }}-config
          ports:
            - name: http
              containerPort: {{ .Values.orderService.service.port }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            {{- toYaml .Values.orderService.resources | nindent 12 }}
