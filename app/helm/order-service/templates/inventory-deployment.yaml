apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "event-driven-azure.fullname" . }}-inventory
  labels:
    {{- include "event-driven-azure.labels" . | nindent 4 }}
    app.kubernetes.io/component: inventory-service
spec:
  {{- if not .Values.inventoryService.autoscaling.enabled }}
  replicas: {{ .Values.inventoryService.replicaCount }}
  {{- end }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: inventory-service
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
      labels:
        {{- include "event-driven-azure.labels" . | nindent 8 }}
        app.kubernetes.io/component: inventory-service
    spec:
      serviceAccountName: {{ include "event-driven-azure.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: inventory-service
          image: {{ include "event-driven-azure.image" (dict "root" . "repository" .Values.inventoryService.image.repository) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: OTEL_SERVICE_NAME
              value: inventory-service
            - name: OTEL_ENABLED
              value: {{ .Values.otel.enabled | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            - name: KAFKA_BROKER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "event-driven-azure.fullname" . }}-config
                  key: KAFKA_BROKER
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "event-driven-azure.secretName" . }}
                  key: RABBITMQ_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "event-driven-azure.secretName" . }}
                  key: REDIS_URL
          ports:
            - name: health
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.inventoryService.resources | nindent 12 }}
