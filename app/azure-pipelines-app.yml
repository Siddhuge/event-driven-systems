trigger:
  branches:
    include:
      - main
  paths:
    include:
      - app/*
    exclude:
      - services/*
      - infra/*
      - helm/*
      - README.md

pr:
  branches:
    include:
      - main
  paths:
    include:
      - app/*

variables:
  - group: event-driven-azure-dev
  - name: azureServiceConnection
    value: IAC-Conn
  - name: orderImageName
    value: order-service
  - name: inventoryImageName
    value: inventory-service
  - name: kubernetesNamespace
    value: event-driven
  - name: releaseName
    value: event-driven-azure
  - name: runtimeSecretName
    value: event-driven-azure-runtime
  - name: keyVaultSecretsFilter
    value: rabbitmq-url,redis-url,jwt-secret
  - name: securityScanSeverity
    value: HIGH,CRITICAL
  - name: approvalNotifyUsers
    value: ""
  - name: acrName
    value: eventdrivendevacr
  - name: azureResourceGroup
    value: event-driven-dev-rg
  - name: aksClusterName
    value: event-driven-dev-aks
  - name: keyVaultName
    value: event-driven-dev-kv
  # Semantic versioning: using Git commit SHA + short commit count
  - name: imageTag
    value: "$(Build.SourceVersion.Substring(0,8))-$(Build.BuildNumber)"
  - name: skipImagePull
    value: false

stages:

# =========================
# UNIT TESTS + COVERAGE
# =========================
- stage: Test
  displayName: Unit Tests & Coverage
  jobs:
    - job: RunTests
      displayName: Run Unit Tests
      pool:
        vmImage: ubuntu-latest
      steps:
        - checkout: self

        - task: NodeTool@0
          inputs:
            versionSpec: '20.x'
          displayName: Install Node.js 20

        - script: |
            set -eu
            cd app/services/order-service
            npm ci
            npm run test:ci
          displayName: Test Order Service
          env:
            JWT_SECRET: test-secret-for-ci

        - script: |
            set -eu
            cd app/services/inventory-service
            npm ci
            npm run test:ci
          displayName: Test Inventory Service

        - task: PublishTestResults@2
          condition: always()
          inputs:
            testResultsFormat: JUnit
            testResultsFiles: '**/junit.xml'
            failTaskOnFailedTests: true
          displayName: Publish Test Results

# =========================
# PRE-BUILD SECURITY SCANNING
# =========================
- stage: PreBuildSecurityScan
  displayName: Pre-Build Security Scan
  dependsOn: Test
  jobs:
    - job: ScanSourceAndManifests
      pool:
        vmImage: ubuntu-latest
      steps:
        - checkout: self

        - script: |
            set -eu
            sudo apt-get update
            sudo apt-get install -y wget apt-transport-https gnupg lsb-release
            wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
            echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
            sudo apt-get update
            sudo apt-get install -y trivy
          displayName: Install Trivy

        - script: |
            set -eu
            trivy config --severity "$(securityScanSeverity)" --exit-code 1 app/services/order-service/Dockerfile
            trivy config --severity "$(securityScanSeverity)" --exit-code 1 app/services/inventory-service/Dockerfile
            trivy config --severity "$(securityScanSeverity)" --exit-code 1 app/helm/order-service
          displayName: Scan Dockerfiles And Kubernetes Manifests

        - script: |
            set -eu
            trivy fs \
              --scanners vuln,secret \
              --skip-dirs app/services/order-service/node_modules \
              --skip-dirs app/services/inventory-service/node_modules \
              --severity "$(securityScanSeverity)" \
              --exit-code 1 \
              .
          displayName: Scan Source Code Dependencies And Secrets

        - script: |
            set -eu
            if [ -f app/services/inventory-service/package-lock.json ]; then
              npm audit --prefix app/services/inventory-service --omit=dev --audit-level=high
            fi

            if [ -f app/services/order-service/package-lock.json ]; then
              npm audit --prefix app/services/order-service --omit=dev --audit-level=high
            else
              echo "Skipping npm audit for order-service: package-lock.json not present."
            fi
          displayName: Run NPM Dependency Audit

# =========================
# BUILD & PUSH IMAGE
# =========================
- stage: Build
  displayName: 🔨 Build & Push Images
  dependsOn: PreBuildSecurityScan
  jobs:
    - job: BuildPush
      displayName: Build and push container images
      pool:
        vmImage: ubuntu-latest
      steps:
        - checkout: self

        - script: |
            # Generate semantic version tags
            SHORT_SHA=$(git rev-parse --short HEAD)
            BUILD_NUM=$(Build.BuildNumber)
            IMAGE_TAG="${SHORT_SHA}-${BUILD_NUM}"
            LATEST_TAG="latest"
            
            echo "##vso[task.setvariable variable=ImageTag]${IMAGE_TAG}"
            echo "##vso[task.setvariable variable=LatestTag]${LATEST_TAG}"
            echo "📦 Built tags: ${IMAGE_TAG}, ${LATEST_TAG}"
          displayName: Generate Image Tags
          workingDirectory: $(Build.SourcesDirectory)

        - task: AzureCLI@2
          displayName: Whitelist Pipeline Agent IP in ACR
          inputs:
            azureSubscription: $(azureServiceConnection)
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              set -eu
              AGENT_IP=$(curl -sf https://ifconfig.me)
              echo "Pipeline agent IP: ${AGENT_IP}"
              az acr network-rule add \
                --name "$(acrName)" \
                --resource-group "$(azureResourceGroup)" \
                --ip-address "${AGENT_IP}/32" || true
              echo "##vso[task.setvariable variable=AgentIP]${AGENT_IP}"
              sleep 10

        - task: Docker@2
          displayName: Build & Push Order Service Image
          inputs:
            containerRegistry: ACR-Connection
            repository: $(orderImageName)
            command: buildAndPush
            Dockerfile: app/services/order-service/Dockerfile
            buildContext: app/services/order-service
            tags: |
              $(ImageTag)
              $(LatestTag)

        - task: Docker@2
          displayName: Build & Push Inventory Service Image
          inputs:
            containerRegistry: ACR-Connection
            repository: $(inventoryImageName)
            command: buildAndPush
            Dockerfile: app/services/inventory-service/Dockerfile
            buildContext: app/services/inventory-service
            tags: |
              $(ImageTag)
              $(LatestTag)

        - task: AzureCLI@2
          displayName: Remove Pipeline Agent IP from ACR
          condition: always()
          inputs:
            azureSubscription: $(azureServiceConnection)
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              set -eu
              az acr network-rule remove \
                --name "$(acrName)" \
                --resource-group "$(azureResourceGroup)" \
                --ip-address "$(AgentIP)/32" || true

        - task: HelmInstaller@1
          displayName: Install Helm

        - script: helm lint app/helm/order-service --strict
          displayName: Lint Helm Chart

# =========================
# IMAGE SECURITY SCANNING
# =========================
- stage: ImageSecurityScan
  displayName: 🔒 Image Security Scan
  dependsOn: Build
  jobs:
    - job: ScanContainerImages
      displayName: Scan images for vulnerabilities
      pool:
        vmImage: ubuntu-latest
      steps:
        - checkout: self

        - script: |
            set -eu
            sudo apt-get update
            sudo apt-get install -y wget apt-transport-https gnupg lsb-release
            wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
            echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
            sudo apt-get update
            sudo apt-get install -y trivy
          displayName: Install Trivy

        - task: AzureCLI@2
          displayName: Whitelist Pipeline Agent IP in ACR
          inputs:
            azureSubscription: $(azureServiceConnection)
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              set -eu
              AGENT_IP=$(curl -sf https://ifconfig.me)
              echo "Pipeline agent IP: ${AGENT_IP}"
              az acr network-rule add \
                --name "$(acrName)" \
                --resource-group "$(azureResourceGroup)" \
                --ip-address "${AGENT_IP}/32" || true
              echo "##vso[task.setvariable variable=AgentIP]${AGENT_IP}"
              sleep 10

        - task: AzureCLI@2
          displayName: Scan Container Images
          inputs:
            azureSubscription: $(azureServiceConnection)
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              set -eu
              az acr login --name "$(acrName)"

              IMAGE_TAG="$(git rev-parse --short HEAD)-$(Build.BuildNumber)"
              echo "🔍 Scanning image tag: ${IMAGE_TAG}"

              ORDER_IMAGE="$(acrName).azurecr.io/$(orderImageName):${IMAGE_TAG}"
              INVENTORY_IMAGE="$(acrName).azurecr.io/$(inventoryImageName):${IMAGE_TAG}"

              # Pull images locally so Trivy scans the local Docker daemon
              # (Trivy's remote scanner does not inherit az acr login credentials)
              docker pull "${ORDER_IMAGE}"
              docker pull "${INVENTORY_IMAGE}"

              trivy image \
                --severity "$(securityScanSeverity)" \
                --exit-code 1 \
                --format sarif \
                --output order-service-trivy.sarif \
                "${ORDER_IMAGE}"

              trivy image \
                --severity "$(securityScanSeverity)" \
                --exit-code 1 \
                --format sarif \
                --output inventory-service-trivy.sarif \
                "${INVENTORY_IMAGE}"

        - task: AzureCLI@2
          displayName: Remove Pipeline Agent IP from ACR
          condition: always()
          inputs:
            azureSubscription: $(azureServiceConnection)
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              set -eu
              az acr network-rule remove \
                --name "$(acrName)" \
                --resource-group "$(azureResourceGroup)" \
                --ip-address "$(AgentIP)/32" || true

        - task: PublishBuildArtifacts@1
          condition: always()
          displayName: Publish Trivy Reports
          inputs:
            pathToPublish: $(Build.SourcesDirectory)
            artifactName: trivy-reports

# =========================
# MANUAL APPROVAL
# =========================
- stage: PreDeploymentApproval
  displayName: 🔐 Pre-Deployment Approval
  dependsOn: ImageSecurityScan
  condition: succeeded()
  jobs:
    - job: AwaitApproval
      displayName: Await manual approval
      pool: server
      timeoutInMinutes: 1440
      steps:
        - task: ManualValidation@0
          timeoutInMinutes: 1440
          inputs:
            notifyUsers: $(approvalNotifyUsers)
            instructions: |
              ✅ Deployment Readiness Checklist:
              
              1. Review security scan results and Trivy reports
              2. Verify image tags and deployment values
              3. Check runtime configuration (Kafka, RabbitMQ, Redis URLs)
              4. Confirm AKS maintenance window is clear
              5. Verify Key Vault secrets are populated
              6. Ensure rollback strategy is in place
              
              Image Tag: $(ImageTag)
              Environment: dev
            onTimeout: reject

# =========================
# DEPLOY TO AKS
# =========================
- stage: Deploy
  displayName: 🚀 Deploy to AKS
  dependsOn: PreDeploymentApproval
  condition: succeeded()
  jobs:
    - deployment: DeployToAKS
      displayName: Deploy services to AKS
      environment: dev
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self

              - task: HelmInstaller@1
                displayName: Install Helm

              - script: |
                  set -eu

                  for name in ACR_NAME AZURE_RESOURCE_GROUP AKS_CLUSTER_NAME KAFKA_BROKER KEY_VAULT_NAME RUNTIME_SECRET_NAME; do
                    eval "value=\${$name:-}"
                    if [ -z "$value" ]; then
                      echo "❌ Required deployment variable $name is missing."
                      exit 1
                    fi
                  done
                  echo "✅ All required deployment variables present"
                displayName: Validate Deployment Variables
                env:
                  ACR_NAME: $(acrName)
                  AZURE_RESOURCE_GROUP: $(azureResourceGroup)
                  AKS_CLUSTER_NAME: $(aksClusterName)
                  KAFKA_BROKER: $(kafkaBroker)
                  KEY_VAULT_NAME: $(keyVaultName)
                  RUNTIME_SECRET_NAME: $(runtimeSecretName)

              - task: AzureKeyVault@2
                displayName: Fetch Runtime Secrets From Azure Key Vault
                inputs:
                  azureSubscription: $(azureServiceConnection)
                  KeyVaultName: $(keyVaultName)
                  SecretsFilter: $(keyVaultSecretsFilter)
                  RunAsPreJob: false

              - script: |
                  set -eu

                  for name in RABBITMQ_URL REDIS_URL JWT_SECRET; do
                    eval "value=\${$name:-}"
                    if [ -z "$value" ]; then
                      echo "❌ Required Key Vault secret for $name is missing."
                      exit 1
                    fi
                  done
                  echo "✅ All required secrets present"
                displayName: Validate Key Vault Secrets
                env:
                  RABBITMQ_URL: $(rabbitmq-url)
                  REDIS_URL: $(redis-url)
                  JWT_SECRET: $(jwt-secret)

              - task: AzureCLI@2
                displayName: Create Or Update AKS Runtime Secret
                inputs:
                  azureSubscription: $(azureServiceConnection)
                  scriptType: bash
                  scriptLocation: inlineScript
                  inlineScript: |
                    set -eu

                    az aks get-credentials \
                      --resource-group "$AZURE_RESOURCE_GROUP" \
                      --name "$AKS_CLUSTER_NAME" \
                      --overwrite-existing

                    kubectl create namespace "$KUBERNETES_NAMESPACE" \
                      --dry-run=client \
                      -o yaml | kubectl apply -f -

                    kubectl create secret generic "$RUNTIME_SECRET_NAME" \
                      --namespace "$KUBERNETES_NAMESPACE" \
                      --from-literal=RABBITMQ_URL="$RABBITMQ_URL" \
                      --from-literal=REDIS_URL="$REDIS_URL" \
                      --from-literal=JWT_SECRET="$JWT_SECRET" \
                      --dry-run=client \
                      -o yaml | kubectl apply -f -
                      
                    echo "✅ Kubernetes secrets updated"
                env:
                  AZURE_RESOURCE_GROUP: $(azureResourceGroup)
                  AKS_CLUSTER_NAME: $(aksClusterName)
                  KUBERNETES_NAMESPACE: $(kubernetesNamespace)
                  RUNTIME_SECRET_NAME: $(runtimeSecretName)
                  RABBITMQ_URL: $(rabbitmq-url)
                  REDIS_URL: $(redis-url)
                  JWT_SECRET: $(jwt-secret)

              - task: HelmDeploy@0
                displayName: Deploy with Helm (Atomic + Rollback)
                inputs:
                  connectionType: Azure Resource Manager
                  azureSubscriptionEndpoint: $(azureServiceConnection)
                  azureResourceGroup: $(azureResourceGroup)
                  kubernetesCluster: $(aksClusterName)
                  namespace: $(kubernetesNamespace)
                  command: upgrade
                  chartType: FilePath
                  chartPath: app/helm/order-service
                  releaseName: $(releaseName)
                  install: true
                  waitForExecution: true
                  arguments: >
                    --atomic
                    --timeout 10m
                    --create-namespace
                    --values app/helm/order-service/values-dev.yaml
                    --set-string global.imageRegistry=$(acrName).azurecr.io
                    --set-string global.imageTag=$(ImageTag)
                    --set-string config.kafkaBroker=$(kafkaBroker)
                    --set secrets.create=false
                    --set-string secrets.existingSecret=$(runtimeSecretName)

              - script: |
                  kubectl rollout status deployment -n "$(kubernetesNamespace)" --timeout=5m
                  echo "✅ Deployment successful!"
                displayName: Verify Deployment Rollout
                env:
                  KUBECONFIG: $(KUBECONFIG)
