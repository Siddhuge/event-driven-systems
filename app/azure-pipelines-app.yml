trigger:
  branches:
    include:
      - main
  paths:
    include:
      - app/*
    exclude:
      - services/*
      - infra/*
      - helm/*
      - README.md

pr:
  branches:
    include:
      - main
  paths:
    include:
      - app/*

variables:
  - group: event-driven-azure-dev
  - name: azureServiceConnection
    value: IAC-Conn
  - name: orderImageName
    value: order-service
  - name: inventoryImageName
    value: inventory-service
  - name: kubernetesNamespace
    value: event-driven
  - name: releaseName
    value: event-driven-azure
  - name: runtimeSecretName
    value: event-driven-azure-runtime
  - name: keyVaultSecretsFilter
    value: rabbitmq-url,redis-url,jwt-secret
  - name: securityScanSeverity
    value: HIGH,CRITICAL
  - name: approvalNotifyUsers
    value: ""
  - name: acrName
    value: eventdrivendevacr
  - name: azureResourceGroup
    value: event-driven-dev-rg
  - name: aksClusterName
    value: event-driven-dev-aks
  - name: keyVaultName
    value: event-driven-dev-kv
  - name: skipImagePull
    value: false

stages:

# =========================
# UNIT TESTS + COVERAGE
# =========================
- stage: Test
  displayName: Unit Tests & Coverage
  jobs:
    - job: RunTests
      displayName: Run Unit Tests
      pool:
        vmImage: ubuntu-latest
      steps:
        - checkout: self

        - task: NodeTool@0
          inputs:
            versionSpec: '20.x'
          displayName: Install Node.js 20

        - script: |
            set -eu
            cd app/services/order-service
            npm ci
            npm run test:ci
          displayName: Test Order Service
          env:
            JWT_SECRET: test-secret-for-ci

        - script: |
            set -eu
            cd app/services/inventory-service
            npm ci
            npm run test:ci
          displayName: Test Inventory Service

        - task: PublishTestResults@2
          condition: always()
          inputs:
            testResultsFormat: JUnit
            testResultsFiles: '**/junit.xml'
            failTaskOnFailedTests: true
          displayName: Publish Test Results

# =========================
# PRE-BUILD SECURITY SCANNING
# =========================
- stage: PreBuildSecurityScan
  displayName: Pre-Build Security Scan
  dependsOn: Test
  jobs:
    - job: ScanSourceAndManifests
      pool:
        vmImage: ubuntu-latest
      steps:
        - checkout: self

        - script: |
            set -eu
            sudo apt-get update
            sudo apt-get install -y wget apt-transport-https gnupg lsb-release
            wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
            echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
            sudo apt-get update
            sudo apt-get install -y trivy
          displayName: Install Trivy

        - script: |
            set -eu
            trivy config --severity "$(securityScanSeverity)" --exit-code 1 app/services/order-service/Dockerfile
            trivy config --severity "$(securityScanSeverity)" --exit-code 1 app/services/inventory-service/Dockerfile
            trivy config --severity "$(securityScanSeverity)" --exit-code 1 app/helm/order-service
          displayName: Scan Dockerfiles And Kubernetes Manifests

        - script: |
            set -eu
            trivy fs \
              --scanners vuln,secret \
              --skip-dirs app/services/order-service/node_modules \
              --skip-dirs app/services/inventory-service/node_modules \
              --severity "$(securityScanSeverity)" \
              --exit-code 1 \
              .
          displayName: Scan Source Code Dependencies And Secrets

        - script: |
            set -eu
            if [ -f app/services/inventory-service/package-lock.json ]; then
              npm audit --prefix app/services/inventory-service --omit=dev --audit-level=high
            fi

            if [ -f app/services/order-service/package-lock.json ]; then
              npm audit --prefix app/services/order-service --omit=dev --audit-level=high
            else
              echo "Skipping npm audit for order-service: package-lock.json not present."
            fi
          displayName: Run NPM Dependency Audit

# =========================
# BUILD & PUSH IMAGE
# =========================
- stage: Build
  displayName: 🔨 Build & Push Images
  dependsOn: PreBuildSecurityScan
  jobs:
    - job: BuildPush
      displayName: Build and push container images
      pool:
        vmImage: ubuntu-latest
      steps:
        - checkout: self

        - script: |
            SHORT_SHA=$(git rev-parse --short HEAD)
            IMAGE_TAG="${SHORT_SHA}-$(Build.BuildNumber)"
            echo "##vso[task.setvariable variable=ImageTag;isOutput=true]${IMAGE_TAG}"
            echo "##vso[task.setvariable variable=ImageTag]${IMAGE_TAG}"
            echo "##vso[task.setvariable variable=LatestTag]latest"
            echo "📦 Image tag: ${IMAGE_TAG}"
          name: GenerateImageTags
          displayName: Generate Image Tags
          workingDirectory: $(Build.SourcesDirectory)

        - task: AzureCLI@2
          displayName: Whitelist Pipeline Agent IP in ACR
          inputs:
            azureSubscription: $(azureServiceConnection)
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              set -eu
              AGENT_IP=$(curl -sf https://ifconfig.me)
              echo "Pipeline agent IP: ${AGENT_IP}"
              az acr network-rule add \
                --name "$(acrName)" \
                --resource-group "$(azureResourceGroup)" \
                --ip-address "${AGENT_IP}/32" || true
              echo "##vso[task.setvariable variable=AgentIP]${AGENT_IP}"
              sleep 10

        - task: AzureCLI@2
          displayName: Build & Push Order Service Image
          inputs:
            azureSubscription: $(azureServiceConnection)
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              set -eu
              az acr login --name "$(acrName)"
              docker build \
                -t "$(acrName).azurecr.io/$(orderImageName):$(ImageTag)" \
                -t "$(acrName).azurecr.io/$(orderImageName):latest" \
                -f app/services/order-service/Dockerfile \
                app/services/order-service
              docker push "$(acrName).azurecr.io/$(orderImageName):$(ImageTag)"
              docker push "$(acrName).azurecr.io/$(orderImageName):latest"

        - task: AzureCLI@2
          displayName: Build & Push Inventory Service Image
          inputs:
            azureSubscription: $(azureServiceConnection)
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              set -eu
              az acr login --name "$(acrName)"
              docker build \
                -t "$(acrName).azurecr.io/$(inventoryImageName):$(ImageTag)" \
                -t "$(acrName).azurecr.io/$(inventoryImageName):latest" \
                -f app/services/inventory-service/Dockerfile \
                app/services/inventory-service
              docker push "$(acrName).azurecr.io/$(inventoryImageName):$(ImageTag)"
              docker push "$(acrName).azurecr.io/$(inventoryImageName):latest"

        - task: AzureCLI@2
          displayName: Remove Pipeline Agent IP from ACR
          condition: always()
          inputs:
            azureSubscription: $(azureServiceConnection)
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              set -eu
              az acr network-rule remove \
                --name "$(acrName)" \
                --resource-group "$(azureResourceGroup)" \
                --ip-address "$(AgentIP)/32" || true

        - task: HelmInstaller@1
          displayName: Install Helm

        - script: helm lint app/helm/order-service --strict
          displayName: Lint Helm Chart

# =========================
# IMAGE SECURITY SCANNING
# =========================
- stage: ImageSecurityScan
  displayName: 🔒 Image Security Scan
  dependsOn: Build
  variables:
    ImageTag: $[ stageDependencies.Build.BuildPush.outputs['GenerateImageTags.ImageTag'] ]
  jobs:
    - job: ScanContainerImages
      displayName: Scan images for vulnerabilities
      pool:
        vmImage: ubuntu-latest
      steps:
        - checkout: self

        - script: |
            set -eu
            sudo apt-get update
            sudo apt-get install -y wget apt-transport-https gnupg lsb-release
            wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
            echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
            sudo apt-get update
            sudo apt-get install -y trivy
          displayName: Install Trivy

        - task: AzureCLI@2
          displayName: Whitelist Pipeline Agent IP in ACR
          inputs:
            azureSubscription: $(azureServiceConnection)
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              set -eu
              AGENT_IP=$(curl -sf https://ifconfig.me)
              echo "Pipeline agent IP: ${AGENT_IP}"
              az acr network-rule add \
                --name "$(acrName)" \
                --resource-group "$(azureResourceGroup)" \
                --ip-address "${AGENT_IP}/32" || true
              echo "##vso[task.setvariable variable=AgentIP]${AGENT_IP}"
              sleep 10

        - task: AzureCLI@2
          displayName: Scan Container Images
          inputs:
            azureSubscription: $(azureServiceConnection)
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              set -eu
              az acr login --name "$(acrName)"

              IMAGE_TAG="$(ImageTag)"
              echo "🔍 Scanning image tag: ${IMAGE_TAG}"

              ORDER_IMAGE="$(acrName).azurecr.io/$(orderImageName):${IMAGE_TAG}"
              INVENTORY_IMAGE="$(acrName).azurecr.io/$(inventoryImageName):${IMAGE_TAG}"

              # Pull images locally; Trivy's remote scanner does not inherit az acr login credentials
              docker pull "${ORDER_IMAGE}"
              docker pull "${INVENTORY_IMAGE}"

              # Gate scans: table format so findings are visible in the pipeline log
              trivy image \
                --severity "$(securityScanSeverity)" \
                --ignore-unfixed \
                --ignorefile app/services/order-service/.trivyignore \
                --exit-code 1 \
                "${ORDER_IMAGE}"

              trivy image \
                --severity "$(securityScanSeverity)" \
                --ignore-unfixed \
                --ignorefile app/services/inventory-service/.trivyignore \
                --exit-code 1 \
                "${INVENTORY_IMAGE}"

              # Artifact scans: SARIF for publishing (no gate, already checked above)
              trivy image \
                --severity "$(securityScanSeverity)" \
                --ignore-unfixed \
                --ignorefile app/services/order-service/.trivyignore \
                --skip-db-update \
                --format sarif \
                --output order-service-trivy.sarif \
                "${ORDER_IMAGE}"

              trivy image \
                --severity "$(securityScanSeverity)" \
                --ignore-unfixed \
                --ignorefile app/services/inventory-service/.trivyignore \
                --skip-db-update \
                --format sarif \
                --output inventory-service-trivy.sarif \
                "${INVENTORY_IMAGE}"

        - task: AzureCLI@2
          displayName: Remove Pipeline Agent IP from ACR
          condition: always()
          inputs:
            azureSubscription: $(azureServiceConnection)
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              set -eu
              az acr network-rule remove \
                --name "$(acrName)" \
                --resource-group "$(azureResourceGroup)" \
                --ip-address "$(AgentIP)/32" || true

        - task: PublishBuildArtifacts@1
          condition: always()
          displayName: Publish Trivy Reports
          inputs:
            pathToPublish: $(Build.SourcesDirectory)
            artifactName: trivy-reports

# =========================
# MANUAL APPROVAL
# =========================
- stage: PreDeploymentApproval
  displayName: 🔐 Pre-Deployment Approval
  dependsOn: ImageSecurityScan
  condition: succeeded()
  variables:
    ImageTag: $[ stageDependencies.Build.BuildPush.outputs['GenerateImageTags.ImageTag'] ]
  jobs:
    - job: AwaitApproval
      displayName: Await manual approval
      pool: server
      timeoutInMinutes: 1440
      steps:
        - task: ManualValidation@0
          timeoutInMinutes: 1440
          inputs:
            notifyUsers: $(approvalNotifyUsers)
            instructions: |
              ✅ Deployment Readiness Checklist:
              
              1. Review security scan results and Trivy reports
              2. Verify image tags and deployment values
              3. Check runtime configuration (Kafka, RabbitMQ, Redis URLs)
              4. Confirm AKS maintenance window is clear
              5. Verify Key Vault secrets are populated
              6. Ensure rollback strategy is in place
              
              Image Tag: $(ImageTag)
              Environment: dev
            onTimeout: reject

# =========================
# DEPLOY TO AKS
# =========================
- stage: Deploy
  displayName: 🚀 Deploy to AKS
  dependsOn: PreDeploymentApproval
  condition: succeeded()
  variables:
    ImageTag: $[ stageDependencies.Build.BuildPush.outputs['GenerateImageTags.ImageTag'] ]
  jobs:
    - deployment: DeployToAKS
      displayName: Deploy services to AKS
      environment: dev
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self

              - task: HelmInstaller@1
                displayName: Install Helm

              - script: |
                  set -eu

                  for name in ACR_NAME AZURE_RESOURCE_GROUP AKS_CLUSTER_NAME KAFKA_BROKER KEY_VAULT_NAME RUNTIME_SECRET_NAME; do
                    eval "value=\${$name:-}"
                    if [ -z "$value" ]; then
                      echo "❌ Required deployment variable $name is missing."
                      exit 1
                    fi
                  done
                  echo "✅ All required deployment variables present"
                displayName: Validate Deployment Variables
                env:
                  ACR_NAME: $(acrName)
                  AZURE_RESOURCE_GROUP: $(azureResourceGroup)
                  AKS_CLUSTER_NAME: $(aksClusterName)
                  KAFKA_BROKER: $(kafkaBroker)
                  KEY_VAULT_NAME: $(keyVaultName)
                  RUNTIME_SECRET_NAME: $(runtimeSecretName)

              - task: AzureKeyVault@2
                displayName: Fetch Runtime Secrets From Azure Key Vault
                inputs:
                  azureSubscription: $(azureServiceConnection)
                  KeyVaultName: $(keyVaultName)
                  SecretsFilter: $(keyVaultSecretsFilter)
                  RunAsPreJob: false

              - script: |
                  set -eu

                  for name in RABBITMQ_URL REDIS_URL JWT_SECRET; do
                    eval "value=\${$name:-}"
                    if [ -z "$value" ]; then
                      echo "❌ Required Key Vault secret for $name is missing."
                      exit 1
                    fi
                  done
                  echo "✅ All required secrets present"
                displayName: Validate Key Vault Secrets
                env:
                  RABBITMQ_URL: $(rabbitmq-url)
                  REDIS_URL: $(redis-url)
                  JWT_SECRET: $(jwt-secret)

              - task: AzureCLI@2
                displayName: Create Or Update AKS Runtime Secret
                inputs:
                  azureSubscription: $(azureServiceConnection)
                  scriptType: bash
                  scriptLocation: inlineScript
                  inlineScript: |
                    set -eu
                    {
                      printf 'apiVersion: v1\nkind: Namespace\nmetadata:\n  name: %s\n' "$KUBERNETES_NAMESPACE"
                      printf -- '---\napiVersion: v1\nkind: Secret\nmetadata:\n  name: %s\n  namespace: %s\n' "$RUNTIME_SECRET_NAME" "$KUBERNETES_NAMESPACE"
                      printf 'type: Opaque\nstringData:\n'
                      printf '  RABBITMQ_URL: "%s"\n' "$RABBITMQ_URL"
                      printf '  REDIS_URL: "%s"\n' "$REDIS_URL"
                      printf '  JWT_SECRET: "%s"\n' "$JWT_SECRET"
                    } > /tmp/runtime-secret.yaml
                    az aks command invoke \
                      --resource-group "$AZURE_RESOURCE_GROUP" \
                      --name "$AKS_CLUSTER_NAME" \
                      --command "kubectl apply -f runtime-secret.yaml" \
                      --file /tmp/runtime-secret.yaml
                    echo "✅ Kubernetes secrets updated"
                env:
                  AZURE_RESOURCE_GROUP: $(azureResourceGroup)
                  AKS_CLUSTER_NAME: $(aksClusterName)
                  KUBERNETES_NAMESPACE: $(kubernetesNamespace)
                  RUNTIME_SECRET_NAME: $(runtimeSecretName)
                  RABBITMQ_URL: $(rabbitmq-url)
                  REDIS_URL: $(redis-url)
                  JWT_SECRET: $(jwt-secret)

              - task: AzureCLI@2
                displayName: Deploy with Helm via AKS Command Invoke
                inputs:
                  azureSubscription: $(azureServiceConnection)
                  scriptType: bash
                  scriptLocation: inlineScript
                  inlineScript: |
                    set -eu
                    CHART_PKG=$(helm package "$(Build.SourcesDirectory)/app/helm/order-service" -d /tmp/ | awk '{print $NF}')
                    echo "📦 Chart: $CHART_PKG"
                    az aks command invoke \
                      --resource-group "$AZURE_RESOURCE_GROUP" \
                      --name "$AKS_CLUSTER_NAME" \
                      --command "helm upgrade --install $RELEASE_NAME ./$(basename "$CHART_PKG") --namespace $KUBERNETES_NAMESPACE --create-namespace --atomic --timeout 10m --values values-dev.yaml --set-string global.imageRegistry=$ACR_NAME.azurecr.io --set-string global.imageTag=$IMAGE_TAG --set-string config.kafkaBroker=$KAFKA_BROKER --set secrets.create=false --set-string secrets.existingSecret=$RUNTIME_SECRET_NAME" \
                      --file "$CHART_PKG" \
                      --file "$(Build.SourcesDirectory)/app/helm/order-service/values-dev.yaml"
                    echo "✅ Helm deployment complete"
                env:
                  AZURE_RESOURCE_GROUP: $(azureResourceGroup)
                  AKS_CLUSTER_NAME: $(aksClusterName)
                  KUBERNETES_NAMESPACE: $(kubernetesNamespace)
                  RELEASE_NAME: $(releaseName)
                  ACR_NAME: $(acrName)
                  IMAGE_TAG: $(ImageTag)
                  KAFKA_BROKER: $(kafkaBroker)
                  RUNTIME_SECRET_NAME: $(runtimeSecretName)

              - task: AzureCLI@2
                displayName: Verify Deployment Rollout
                inputs:
                  azureSubscription: $(azureServiceConnection)
                  scriptType: bash
                  scriptLocation: inlineScript
                  inlineScript: |
                    set -eu
                    az aks command invoke \
                      --resource-group "$AZURE_RESOURCE_GROUP" \
                      --name "$AKS_CLUSTER_NAME" \
                      --command "kubectl rollout status deployment -n $KUBERNETES_NAMESPACE --timeout=5m && echo '✅ Deployment successful!'"
                env:
                  AZURE_RESOURCE_GROUP: $(azureResourceGroup)
                  AKS_CLUSTER_NAME: $(aksClusterName)
                  KUBERNETES_NAMESPACE: $(kubernetesNamespace)
