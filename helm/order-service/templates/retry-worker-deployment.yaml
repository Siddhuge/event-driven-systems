apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "event-driven-azure.fullname" . }}-retry-worker
  labels:
    {{- include "event-driven-azure.labels" . | nindent 4 }}
    app.kubernetes.io/component: retry-worker
spec:
  {{- if not .Values.retryWorker.autoscaling.enabled }}
  replicas: {{ .Values.retryWorker.replicaCount }}
  {{- end }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: retry-worker
  template:
    metadata:
      labels:
        {{- include "event-driven-azure.labels" . | nindent 8 }}
        app.kubernetes.io/component: retry-worker
    spec:
      serviceAccountName: {{ include "event-driven-azure.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: retry-worker
          image: {{ include "event-driven-azure.image" (dict "root" . "repository" .Values.retryWorker.image.repository) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command: ["node", "src/rabbitmq/retryConsumer.js"]
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: KAFKA_BROKER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "event-driven-azure.fullname" . }}-config
                  key: KAFKA_BROKER
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "event-driven-azure.secretName" . }}
                  key: RABBITMQ_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "event-driven-azure.secretName" . }}
                  key: REDIS_URL
          livenessProbe:
            exec:
              command: ["node", "-e", "process.exit(0)"]
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            {{- toYaml .Values.retryWorker.resources | nindent 12 }}
