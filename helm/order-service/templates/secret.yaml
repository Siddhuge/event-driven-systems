{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "event-driven-azure.secretName" . }}
  labels:
    {{- include "event-driven-azure.labels" . | nindent 4 }}
type: Opaque
stringData:
  RABBITMQ_URL: {{ .Values.secrets.rabbitmqUrl | quote }}
  REDIS_URL: {{ .Values.secrets.redisUrl | quote }}
{{- end -}}
