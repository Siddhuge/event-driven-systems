# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/azure-pipelines-vscode/master/service-schema.json

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - infra/*
    exclude:
      - services/*
      - helm/*
      - README.md

pr:
  branches:
    include:
      - main
  paths:
    include:
      - infra/*

variables:
  - group: infra-jumpbox-dev
  - name: azureServiceConnection
    value: IAC-Conn
  - name: terraformVersion
    value: 1.5.7
  - name: keyVaultNameDev
    value: "event-driven-dev-kv"
  # PROD jumpbox variables (set via queue-time override or a separate variable group when needed)
  - name: jumpboxEnabledProd
    value: "false"
  - name: jumpboxSshPublicKeyProd
    value: ""
  - name: jumpboxAllowedSshCidrProd
    value: ""

stages:

  # =========================================
  # 🔐 SECURITY SCAN
  # =========================================
  - stage: SecurityScan
    displayName: 🔐 Terraform Security Scan
    jobs:
      - job: Checkov
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - script: |
              set -e
              pip install checkov==3.2.526

              echo "🔍 Running Checkov scan (CRITICAL + HIGH only)..."
              checkov -d infra \
                --framework terraform \
                --compact \
                --output cli \
                --output sarif \
                --output-file-path console,checkov-results.sarif \
                --soft-fail-on MEDIUM,LOW,INFO
            displayName: Run Checkov Scan

          - task: PublishPipelineArtifact@1
            condition: always()
            inputs:
              targetPath: checkov-results.sarif
              artifact: checkov-sarif
              publishLocation: pipeline
            displayName: Publish Checkov SARIF

  # =========================================
  # DEV ENVIRONMENT
  # =========================================
  - stage: Dev_Plan
    displayName: 📋 DEV Plan
    dependsOn: SecurityScan
    jobs:
      - job: Plan
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - script: |
              curl -fsSLo terraform.zip "https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_linux_amd64.zip"
              unzip -q terraform.zip
              sudo mv terraform /usr/local/bin/terraform
              terraform version
            displayName: Install Terraform

          - task: AzureCLI@2
            displayName: 🔑 Fetch Secrets from Key Vault (DEV)
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                if az keyvault show --name $(keyVaultNameDev) --query name -o tsv 2>/dev/null; then
                  SSH_KEY=$(az keyvault secret show --vault-name $(keyVaultNameDev) --name jumpbox-ssh-public-key --query value -o tsv 2>/dev/null || true)
                  CIDR=$(az keyvault secret show --vault-name $(keyVaultNameDev) --name jumpbox-allowed-ssh-cidr --query value -o tsv 2>/dev/null || true)
                  echo "##vso[task.setvariable variable=jumpbox-ssh-public-key;issecret=true]$SSH_KEY"
                  echo "##vso[task.setvariable variable=jumpbox-allowed-ssh-cidr]$CIDR"
                  echo "✅ Secrets fetched from Key Vault"
                else
                  echo "⚠️ Key Vault $(keyVaultNameDev) not found — will be created on first apply"
                fi

          - task: AzureCLI@2
            displayName: 📊 Terraform Plan + Drift Detection (DEV)
            inputs:
              azureSubscription: $(azureServiceConnection)
              addSpnToEnvironment: true
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -e

                TF_DIR="$(System.DefaultWorkingDirectory)/infra/envs/dev"

                echo "📁 Terraform Directory: $TF_DIR"
                echo "🔐 Configuring Terraform authentication..."

                export ARM_CLIENT_ID="${servicePrincipalId}"
                export ARM_TENANT_ID="${tenantId}"
                export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                export ARM_USE_OIDC=true
                export ARM_OIDC_TOKEN="${idToken}"

                JUMPBOX_ENABLED="$(jumpboxEnabledDev)"
                SSH_KEY="$(jumpboxSshPublicKeyDev)"
                ALLOWED_CIDR="$(jumpboxAllowedSshCidrDev)"

                if [ "$JUMPBOX_ENABLED" = "true" ]; then
                  if [ -z "$SSH_KEY" ] || [ -z "$ALLOWED_CIDR" ]; then
                    echo "❌ jumpboxEnabledDev=true requires jumpboxSshPublicKeyDev and jumpboxAllowedSshCidrDev in the variable group"
                    exit 1
                  fi
                  {
                    echo "jumpbox_enabled              = true"
                    echo "jumpbox_admin_ssh_public_key = \"$SSH_KEY\""
                    echo "jumpbox_allowed_ssh_cidrs    = [\"$ALLOWED_CIDR\"]"
                  } > "$TF_DIR/pipeline.auto.tfvars"
                  echo "✅ Generated pipeline.auto.tfvars with jumpbox enabled"
                else
                  echo "jumpbox_enabled = false" > "$TF_DIR/pipeline.auto.tfvars"
                  echo "✅ Generated pipeline.auto.tfvars (jumpbox disabled)"
                fi

                terraform -chdir="$TF_DIR" init -input=false

                echo "🔍 Running drift detection..."
                terraform -chdir="$TF_DIR" plan -detailed-exitcode -out=drift.tfplan || exit_code=$?

                if [ "${exit_code:-0}" -eq 2 ]; then
                  echo "⚠️  Drift detected in DEV - review required"
                elif [ "${exit_code:-0}" -eq 1 ]; then
                  echo "❌ Terraform plan failed"
                  exit 1
                else
                  echo "✅ No drift detected in DEV"
                fi

                terraform -chdir="$TF_DIR" plan -out=tfplan
                echo "📋 Plan saved to tfplan"

          - publish: infra/envs/dev/tfplan
            artifact: dev-plan
            displayName: 📦 Publish DEV Plan

  - stage: Dev_Apply
    displayName: 🚀 DEV Apply
    dependsOn: Dev_Plan
    condition: succeeded()
    jobs:
      - deployment: Apply
        displayName: Apply DEV Resources
        environment: dev
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - download: current
                  artifact: dev-plan
                  displayName: 📥 Download DEV Plan

                - script: |
                    curl -fsSLo terraform.zip "https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_linux_amd64.zip"
                    unzip -q terraform.zip
                    sudo mv terraform /usr/local/bin/terraform
                    terraform version
                  displayName: Install Terraform

                - task: AzureCLI@2
                  displayName: 🚀 Apply Terraform (DEV)
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    addSpnToEnvironment: true
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -e

                      TF_DIR="$(System.DefaultWorkingDirectory)/infra/envs/dev"

                      echo "🔐 Configuring Terraform authentication..."
                      export ARM_CLIENT_ID="${servicePrincipalId}"
                      export ARM_TENANT_ID="${tenantId}"
                      export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                      export ARM_USE_OIDC=true
                      export ARM_OIDC_TOKEN="${idToken}"

                      terraform -chdir="$TF_DIR" init -input=false

                      echo "⏳ Applying Terraform plan..."
                      terraform -chdir="$TF_DIR" apply -auto-approve "$(Pipeline.Workspace)/dev-plan/tfplan"

                      echo "✅ DEV infrastructure deployed successfully"

                - task: AzureCLI@2
                  displayName: 🔑 Seed Key Vault Secrets (DEV)
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      SCRIPT="$(Build.SourcesDirectory)/infra/scripts/seed-keyvault.sh"
                      chmod +x "$SCRIPT"
                      NAMESPACE=event-driven
                      KEYVAULT_NAME=$(keyVaultNameDev) \
                      RABBITMQ_URL="amqp://rabbitmq.${NAMESPACE}.svc.cluster.local:5672/" \
                      REDIS_URL="redis://redis-master.${NAMESPACE}.svc.cluster.local:6379" \
                      bash "$SCRIPT"

  # =========================================
  # PROD APPROVAL GATE
  # =========================================
  - stage: Prod_Approval
    displayName: 🔐 Approve PROD Deployment
    dependsOn: Dev_Apply
    condition: succeeded()
    jobs:
      - job: AwaitApproval
        displayName: Manual approval before PROD
        pool: server
        timeoutInMinutes: "1440"
        steps:
          - task: ManualValidation@0
            timeoutInMinutes: 1440
            inputs:
              notifyUsers: ""
              instructions: |
                DEV infrastructure has been applied successfully.

                Before proceeding to PROD, confirm:
                1. DEV smoke tests passed
                2. No outstanding security findings
                3. PROD terraform.tfvars is correct and reviewed
                4. On-call is aware of the production change
                5. Rollback plan is documented
              onTimeout: reject

  # =========================================
  # PROD ENVIRONMENT
  # =========================================
  - stage: Prod_Plan
    displayName: 📋 PROD Plan
    dependsOn: Prod_Approval
    condition: succeeded()
    jobs:
      - job: Plan
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - script: |
              curl -fsSLo terraform.zip "https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_linux_amd64.zip"
              unzip -q terraform.zip
              sudo mv terraform /usr/local/bin/terraform
            displayName: Install Terraform

          - task: AzureCLI@2
            displayName: 📊 Terraform Plan + Drift Detection (PROD)
            inputs:
              azureSubscription: $(azureServiceConnection)
              addSpnToEnvironment: true
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -e

                TF_DIR="$(System.DefaultWorkingDirectory)/infra/envs/prod"

                echo "📁 Terraform Directory: $TF_DIR"
                echo "🔐 Configuring Terraform authentication..."

                export ARM_CLIENT_ID="${servicePrincipalId}"
                export ARM_TENANT_ID="${tenantId}"
                export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                export ARM_USE_OIDC=true
                export ARM_OIDC_TOKEN="${idToken}"

                if [ "$(jumpboxEnabledProd)" = "true" ] && { [ -z "$(jumpboxSshPublicKeyProd)" ] || [ -z "$(jumpboxAllowedSshCidrProd)" ]; }; then
                  echo "jumpboxSshPublicKeyProd and jumpboxAllowedSshCidrProd are required when jumpboxEnabledProd is true."
                  exit 1
                fi

                if [ -n "$(jumpboxSshPublicKeyProd)" ] && [ -n "$(jumpboxAllowedSshCidrProd)" ]; then
                  cat > "$TF_DIR/pipeline.auto.tfvars" <<EOF
                # Secrets created by Terraform in the environment Key Vault.
                key_vault_secrets = {
                  jumpbox-ssh-public-key = {
                    value        = "$(jumpboxSshPublicKeyProd)"
                    content_type = "text/plain"
                  }
                  jumpbox-allowed-ssh-cidr = {
                    value        = "$(jumpboxAllowedSshCidrProd)"
                    content_type = "text/plain"
                  }
                }
                EOF
                else
                  cat > "$TF_DIR/pipeline.auto.tfvars" <<EOF
                key_vault_secrets = {}
                EOF
                fi

                echo "✅ Generated pipeline.auto.tfvars"

                terraform -chdir="$TF_DIR" init -input=false

                echo "🔍 Running drift detection..."
                terraform -chdir="$TF_DIR" plan -detailed-exitcode -out=drift.tfplan || exit_code=$?

                if [ "${exit_code:-0}" -eq 2 ]; then
                  echo "❌ Drift detected in PROD - MUST BE RESOLVED"
                  exit 1
                elif [ "${exit_code:-0}" -eq 1 ]; then
                  echo "❌ Terraform plan failed"
                  exit 1
                else
                  echo "✅ No drift detected in PROD"
                fi

                terraform -chdir="$TF_DIR" plan -out=tfplan
                echo "📋 Plan saved to tfplan"

          - publish: infra/envs/prod/tfplan
            artifact: prod-plan
            displayName: 📦 Publish PROD Plan

  - stage: Prod_Apply
    displayName: 🚀 PROD Apply
    dependsOn: Prod_Plan
    condition: succeeded()
    jobs:
      - deployment: Apply
        displayName: Apply PROD Resources
        environment: prod
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - download: current
                  artifact: prod-plan
                  displayName: 📥 Download PROD Plan

                - script: |
                    curl -fsSLo terraform.zip "https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_linux_amd64.zip"
                    unzip -q terraform.zip
                    sudo mv terraform /usr/local/bin/terraform
                    terraform version
                  displayName: Install Terraform

                - task: AzureCLI@2
                  displayName: 🚀 Apply Terraform (PROD)
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    addSpnToEnvironment: true
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -e

                      TF_DIR="$(System.DefaultWorkingDirectory)/infra/envs/prod"

                      echo "🔐 Configuring Terraform authentication..."
                      export ARM_CLIENT_ID="${servicePrincipalId}"
                      export ARM_TENANT_ID="${tenantId}"
                      export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                      export ARM_USE_OIDC=true
                      export ARM_OIDC_TOKEN="${idToken}"

                      terraform -chdir="$TF_DIR" init -input=false

                      echo "⏳ Applying Terraform plan..."
                      terraform -chdir="$TF_DIR" apply -auto-approve "$(Pipeline.Workspace)/prod-plan/tfplan"

                      echo "✅ PROD infrastructure deployed successfully"
