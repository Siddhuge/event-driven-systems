# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/azure-pipelines-vscode/master/service-schema.json

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  azureServiceConnection: IAC-Conn
  terraformVersion: 1.5.7
  # Environment-specific variables
  jumpboxEnabledDev: 'true'
  jumpboxEnabledProd: 'false'
  keyVaultNameDev: 'event-driven-dev-kv'
  jumpboxSshPublicKeyDev: ''
  jumpboxAllowedSshCidrDev: ''
  jumpboxSshPublicKeyProd: ''
  jumpboxAllowedSshCidrProd: ''

stages:

  # =========================================
  # 🔐 SECURITY SCAN
  # =========================================
  - stage: SecurityScan
    displayName: 🔐 Terraform Security Scan
    jobs:
      - job: Checkov
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - script: |
              set -e
              pip install checkov==3.2.526

              echo "🔍 Running Checkov scan..."
              checkov -d . \
                --framework terraform \
                --quiet \
                --compact \
                --output cli \
                --soft-fail
            displayName: Run Checkov Scan

  # =========================================
  # DEV ENVIRONMENT
  # =========================================
  - stage: Dev_Plan
    displayName: 📋 DEV Plan
    dependsOn: SecurityScan
    jobs:
      - job: Plan
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - script: |
              curl -fsSLo terraform.zip "https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_linux_amd64.zip"
              unzip -q terraform.zip
              sudo mv terraform /usr/local/bin/terraform
              terraform version
            displayName: Install Terraform

          - task: AzureCLI@2
            displayName: 🔑 Fetch Secrets from Key Vault (DEV)
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                if az keyvault show --name $(keyVaultNameDev) --query name -o tsv 2>/dev/null; then
                  SSH_KEY=$(az keyvault secret show --vault-name $(keyVaultNameDev) --name jumpbox-ssh-public-key --query value -o tsv 2>/dev/null || true)
                  CIDR=$(az keyvault secret show --vault-name $(keyVaultNameDev) --name jumpbox-allowed-ssh-cidr --query value -o tsv 2>/dev/null || true)
                  echo "##vso[task.setvariable variable=jumpbox-ssh-public-key;issecret=true]$SSH_KEY"
                  echo "##vso[task.setvariable variable=jumpbox-allowed-ssh-cidr]$CIDR"
                  echo "✅ Secrets fetched from Key Vault"
                else
                  echo "⚠️ Key Vault $(keyVaultNameDev) not found — will be created on first apply"
                fi

          - task: AzureCLI@2
            displayName: 📊 Terraform Plan + Drift Detection (DEV)
            inputs:
              azureSubscription: $(azureServiceConnection)
              addSpnToEnvironment: true
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -e

                TF_DIR="$(System.DefaultWorkingDirectory)/envs/dev"

                echo "📁 Terraform Directory: $TF_DIR"
                echo "🔐 Configuring Terraform authentication..."

                export ARM_CLIENT_ID="${servicePrincipalId}"
                export ARM_TENANT_ID="${tenantId}"
                export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                export ARM_USE_OIDC=true
                export ARM_OIDC_TOKEN="${idToken}"

                cat > "$TF_DIR/pipeline.auto.tfvars" <<EOF
                jumpbox_enabled = $(jumpboxEnabledDev)
                EOF

                echo "✅ Generated pipeline.auto.tfvars (SSH key and KV secrets sourced from terraform.tfvars)"

                terraform -chdir="$TF_DIR" init -input=false

                echo "🔍 Running drift detection..."
                terraform -chdir="$TF_DIR" plan -detailed-exitcode -out=drift.tfplan || exit_code=$?

                if [ "${exit_code:-0}" -eq 2 ]; then
                  echo "⚠️  Drift detected in DEV - review required"
                elif [ "${exit_code:-0}" -eq 1 ]; then
                  echo "❌ Terraform plan failed"
                  exit 1
                else
                  echo "✅ No drift detected in DEV"
                fi

                terraform -chdir="$TF_DIR" plan -out=tfplan
                echo "📋 Plan saved to tfplan"

          - publish: envs/dev/tfplan
            artifact: dev-plan
            displayName: 📦 Publish DEV Plan

  - stage: Dev_Apply
    displayName: 🚀 DEV Apply
    dependsOn: Dev_Plan
    condition: succeeded()
    jobs:
      - deployment: Apply
        displayName: Apply DEV Resources
        environment: dev
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - download: current
                  artifact: dev-plan
                  displayName: 📥 Download DEV Plan

                - task: AzureCLI@2
                  displayName: 🚀 Apply Terraform (DEV)
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    addSpnToEnvironment: true
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -e

                      TF_DIR="$(System.DefaultWorkingDirectory)/envs/dev"

                      echo "🔐 Configuring Terraform authentication..."
                      export ARM_CLIENT_ID="${servicePrincipalId}"
                      export ARM_TENANT_ID="${tenantId}"
                      export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                      export ARM_USE_OIDC=true
                      export ARM_OIDC_TOKEN="${idToken}"

                      terraform -chdir="$TF_DIR" init -input=false
                      
                      echo "⏳ Applying Terraform plan..."
                      terraform -chdir="$TF_DIR" apply -auto-approve "$(Pipeline.Workspace)/dev-plan/tfplan"
                      
                      echo "✅ DEV infrastructure deployed successfully"

  # =========================================
  # PROD ENVIRONMENT
  # =========================================
  - stage: Prod_Plan
    displayName: 📋 PROD Plan
    dependsOn: Dev_Apply
    condition: succeeded()
    jobs:
      - job: Plan
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - script: |
              curl -fsSLo terraform.zip "https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_linux_amd64.zip"
              unzip -q terraform.zip
              sudo mv terraform /usr/local/bin/terraform
            displayName: Install Terraform

          - task: AzureCLI@2
            displayName: 📊 Terraform Plan + Drift Detection (PROD)
            inputs:
              azureSubscription: $(azureServiceConnection)
              addSpnToEnvironment: true
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -e

                TF_DIR="$(System.DefaultWorkingDirectory)/envs/prod"

                echo "📁 Terraform Directory: $TF_DIR"
                echo "🔐 Configuring Terraform authentication..."

                export ARM_CLIENT_ID="${servicePrincipalId}"
                export ARM_TENANT_ID="${tenantId}"
                export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                export ARM_USE_OIDC=true
                export ARM_OIDC_TOKEN="${idToken}"

                if [ "$(jumpboxEnabledProd)" = "true" ] && { [ -z "$(jumpboxSshPublicKeyProd)" ] || [ -z "$(jumpboxAllowedSshCidrProd)" ]; }; then
                  echo "jumpboxSshPublicKeyProd and jumpboxAllowedSshCidrProd are required when jumpboxEnabledProd is true."
                  exit 1
                fi

                if [ -n "$(jumpboxSshPublicKeyProd)" ] && [ -n "$(jumpboxAllowedSshCidrProd)" ]; then
                  cat > "$TF_DIR/pipeline.auto.tfvars" <<EOF
                # Secrets created by Terraform in the environment Key Vault.
                key_vault_secrets = {
                  jumpbox-ssh-public-key = {
                    value        = "$(jumpboxSshPublicKeyProd)"
                    content_type = "text/plain"
                  }
                  jumpbox-allowed-ssh-cidr = {
                    value        = "$(jumpboxAllowedSshCidrProd)"
                    content_type = "text/plain"
                  }
                }
                EOF
                else
                  cat > "$TF_DIR/pipeline.auto.tfvars" <<EOF
                key_vault_secrets = {}
                EOF
                fi

                echo "✅ Generated pipeline.auto.tfvars"

                terraform -chdir="$TF_DIR" init -input=false

                echo "🔍 Running drift detection..."
                terraform -chdir="$TF_DIR" plan -detailed-exitcode -out=drift.tfplan || exit_code=$?

                if [ "${exit_code:-0}" -eq 2 ]; then
                  echo "❌ Drift detected in PROD - MUST BE RESOLVED"
                  exit 1
                elif [ "${exit_code:-0}" -eq 1 ]; then
                  echo "❌ Terraform plan failed"
                  exit 1
                else
                  echo "✅ No drift detected in PROD"
                fi

                terraform -chdir="$TF_DIR" plan -out=tfplan
                echo "📋 Plan saved to tfplan"

          - publish: envs/prod/tfplan
            artifact: prod-plan
            displayName: 📦 Publish PROD Plan

  - stage: Prod_Apply
    displayName: 🚀 PROD Apply
    dependsOn: Prod_Plan
    condition: succeeded()
    jobs:
      - deployment: Apply
        displayName: Apply PROD Resources
        environment: prod
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - download: current
                  artifact: prod-plan
                  displayName: 📥 Download PROD Plan

                - task: AzureCLI@2
                  displayName: 🚀 Apply Terraform (PROD)
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    addSpnToEnvironment: true
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -e

                      TF_DIR="$(System.DefaultWorkingDirectory)/envs/prod"

                      echo "🔐 Configuring Terraform authentication..."
                      export ARM_CLIENT_ID="${servicePrincipalId}"
                      export ARM_TENANT_ID="${tenantId}"
                      export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                      export ARM_USE_OIDC=true
                      export ARM_OIDC_TOKEN="${idToken}"

                      terraform -chdir="$TF_DIR" init -input=false
                      
                      echo "⏳ Applying Terraform plan..."
                      terraform -chdir="$TF_DIR" apply -auto-approve "$(Pipeline.Workspace)/prod-plan/tfplan"
                      
                      echo "✅ PROD infrastructure deployed successfully"
